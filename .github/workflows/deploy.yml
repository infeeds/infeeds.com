name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Astro
        run: bun run build

      - name: Skip and Rename Failed Files
        if: always()
        run: |
          if [ -f .skipped_files.json ]; then
            FILES=$(cat .skipped_files.json | jq -r '.[]')
            if [ -n "$FILES" ]; then
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              for FILE in $FILES; do
                if [ -f "$FILE" ]; then
                  DIR=$(dirname "$FILE")
                  BASENAME=$(basename "$FILE")
                  mv "$FILE" "$DIR/_fail_$BASENAME"
                  git add "$DIR/_fail_$BASENAME"
                  git rm "$FILE"
                fi
              done
              git commit -m "chore: rename skipped files that failed validation" || echo "No changes to commit"
              git push
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4